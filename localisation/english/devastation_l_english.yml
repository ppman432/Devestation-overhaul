 # WARFARE CONDUCT CATEGORY & DECISIONS
 # =====================================================================
 bm_warfare_conduct_category: "§YConduct of Warfare§!"
 bm_warfare_conduct_category_desc: "Directives governing how your military treats §Ycivilian populations§! in contested territories.\n\nMore §Grestrained§! conduct reduces §Rcivilian casualties§!, slows §Rdevastation§!, and preserves §Ginternational standing§!.\nMore §Raggressive§! conduct accelerates your advance at a sustained §Rhumanitarian and logistical cost§!.\n\nThe §Ycurrently active stance§! is greyed out."

 bm_conduct_humanitarian: "§CHumanitarian Conduct§!"
 bm_conduct_humanitarian_desc: "Issue absolute orders to protect civilian life. Bombardment near populated areas is forbidden. Medical units accompany every advance.\n\n§YCombat effects:§!\nArmy Speed §R-15%§!\nAttrition §R+8%§!\nPlanning Speed §R-10%§!\nSoft Attack §R-10%§!\nDig-In Speed §R-5%§!\nDefence §G+5%§!\nMax Organisation §G+5§!\nReinforce Rate §G+5%§!\nOrg Loss When Moving §G-5%§!\nSupply Consumption §R+10%§! (feeding prisoners, civilian logistics)\n\n§YOccupation effects:§!\nMonthly Opinion Gain §G+40%§!\nEnemies need §G40%§! longer to justify war on you\nResistance in occupied states §Gdecreases§!\nCompliance Growth §G+10%§!\nPolitical Power per day §G+0.10§!\n\n§YOn selecting:§!\nStability §G+10%§!\nWar Support §R-20%§! (generals resist the order)\n\n§YCivilian Impact:§!\nCivilian death rate §G×0.25§!\nDevastation gain §G×0.70§!"

 bm_conduct_pacifist: "§GPacifist Conduct§!"
 bm_conduct_pacifist_desc: "Issue strict orders to minimise all civilian harm. Soldiers avoid populated areas and treat captured civilians humanely.\n\n§YCombat effects:§!\nArmy Speed §R-10%§!\nAttrition §R+5%§!\nSoft Attack §R-5%§!\nDig-In Speed §R-5%§!\nDefence §G+3%§!\nMax Organisation §G+3§!\nReinforce Rate §G+3%§!\nOrg Loss When Moving §G-3%§!\nSupply Consumption §R+5%§!\n\n§YOccupation effects:§!\nMonthly Opinion Gain §G+25%§!\nEnemies need §G20%§! longer to justify war on you\nResistance in occupied states §Gslightly decreases§!\nCompliance Growth §G+5%§!\nPolitical Power per day §G+0.05§!\n\n§YOn selecting:§!\nStability §G+5%§!\n\n§YCivilian Impact:§!\nCivilian death rate §G×0.50§!\nDevastation gain §G×0.85§!"

 bm_conduct_restrained: "§LRestrained Conduct§!"
 bm_conduct_restrained_desc: "Maintain disciplined rules of engagement that limit collateral damage where feasible.\n\n§YCombat effects:§!\nArmy Speed §R-5%§!\nAttrition §R+2%§!\nDefence §G+2%§!\nMax Organisation §G+2§!\nReinforce Rate §G+2%§!\nSupply Consumption §R+2%§!\n\n§YOccupation effects:§!\nMonthly Opinion Gain §G+10%§!\nEnemies need §G10%§! longer to justify war on you\nResistance in occupied states §Gslightly decreases§!\nCompliance Growth §G+3%§!\n\n§YCivilian Impact:§!\nCivilian death rate §G×0.75§!\nDevastation gain §G×0.90§!"

 bm_conduct_standard: "Standard Conduct§!"
 bm_conduct_standard_desc: "Follow standard wartime rules of engagement. Civilian harm is not deliberately sought, but operational necessity takes priority when required.\n\nThis is the §Ydefault posture§! — no special restrictions, no special license.\n\n§YCivilian Impact:§!\nCivilian death rate §Y×1.00§!\nDevastation gain §Y×1.00§! — baseline"

 bm_conduct_aggressive: "§YAggressive Conduct§!"
 bm_conduct_aggressive_desc: "Prioritise operational speed over humanitarian caution. Artillery and air support are used freely regardless of proximity to civilian areas.\n\n§YCombat effects:§!\nArmy Speed §G+5%§!\nBreakthrough §G+5%§!\nAttrition §G-5%§!\nSoft Attack §G+5%§!\nDig-In Speed §G+5%§!\nSuppression §G+10§!\nExperience Gain §G+5%§!\nMax Organisation §R-2§!\nSupply Consumption §R+10%§! (heavy ammunition expenditure)\n\n§YOccupation effects:§!\nMonthly Opinion Gain §R-15%§!\nGenerating wargoal tension costs §G10%§! less\nEnemies need §R10%§! less time to justify war on you\nResistance in occupied states §Rincreases§!\nCompliance Growth §R-5%§!\nPolitical Power per day §R-0.05§!\nAll nations: §R-30§! Opinion of you\n\n§YOn selecting:§!\nWar Support §R-5%§!\n\n§YCivilian Impact:§!\nCivilian death rate §R×1.25§!\nDevastation gain §R×1.15§!"

 bm_conduct_total_war: "§OTotal War Conduct§!"
 bm_conduct_total_war_desc: "All restraint is abandoned. Civilian infrastructure is a legitimate military target. Terror is used as a tool of war.\n\n§YCombat effects:§!\nArmy Speed §G+10%§!\nBreakthrough §G+10%§!\nAttrition §G-5%§!\nSoft Attack §G+10%§!\nDig-In Speed §G+10%§!\nSuppression §G+20§!\nExperience Gain §G+10%§!\nMax Organisation §R-5§!\nSupply Consumption §R+20%§! (relentless operations)\n\n§YOccupation effects:§!\nMonthly Opinion Gain §R-30%§!\nGenerating wargoal tension costs §G20%§! less\nEnemies need §R20%§! less time to justify war on you\nWar Support §R-1%§! per week\nResistance in occupied states §Rgrows significantly§!\nCompliance Growth §R-10%§!\nPolitical Power per day §R-0.05§!\nAll nations: §R-60§! Opinion of you\n\n§YOn selecting:§!\nWar Support §R-10%§!\nStability §R-5%§!\n\n§YCivilian Impact:§!\nCivilian death rate §R×1.50§!\nDevastation gain §R×1.30§!"

 bm_conduct_scorched_earth: "§RScorched Earth§!"
 bm_conduct_scorched_earth_desc: "Systematic destruction of everything. No mercy, no infrastructure left standing. The enemy inherits ruins — and so do you.\n\n§YCombat effects:§!\nArmy Speed §G+15%§!\nBreakthrough §G+15%§!\nAttrition §G-10%§!\nSoft Attack §G+15%§!\nDig-In Speed §G+15%§!\nSuppression §G+30§!\nExperience Gain §G+15%§!\nMax Organisation §R-10§!\nSupply Consumption §R+30%§! (destroying your own future logistics)\n\n§YOccupation effects:§!\nMonthly Opinion Gain §R-50%§!\nGenerating wargoal tension costs §G30%§! less\nEnemies need §R40%§! less time to justify war on you\nWar Support §R-1%§! per week\nResistance in occupied states §Rgoes into open revolt§!\nCompliance Growth §R-20%§!\nPolitical Power per day §R-0.10§!\nAll nations: §R-100§! Opinion of you\n\n§YOn selecting:§!\nWar Support §R-15%§!\nStability §R-10%§!\nPolitical Power §R-30§!\n\n§YCivilian Impact:§!\nCivilian death rate §R×2.00§!\nDevastation gain §R×1.60§!"

