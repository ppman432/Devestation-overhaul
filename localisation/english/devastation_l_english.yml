 # REFUGEE POLICY CATEGORY & DECISIONS
 # =====================================================================
 bm_refugee_policy_category: "§YWartime Refugee Policy§!"
 bm_refugee_policy_category_desc: "Determines how open your borders are to §Ydisplaced civilians§! fleeing war.\n\n§GWelcoming§! policies absorb more refugees but strain your §Reconomy and manpower§!.\n§RClosed§! borders preserve resources but §Risolate you diplomatically§! and breed §Runrest in occupied territories§!.\n\nThe §Ycurrently active policy§! is greyed out."

 bm_refugees_open: "§COpen Door Policy§!"
 bm_refugees_open_desc: "Your borders are open to all displaced persons without restriction. Refugees are actively welcomed and resettled.\n\n§YActive effects:§!\nWeekly Manpower §R-75§!\nConsumer Goods §R+5%§!\n\n§YOn selecting:§!\nStability §G+5%§!\n\n§YRouting effect:§!\nRefugees §Gstrongly prefer§! your territory"

 bm_refugees_open_door: "§COpen Door Policy§!"
 bm_refugees_open_door_desc: "Your borders are open to all displaced persons without restriction. Refugees are actively welcomed and resettled.\n\n§YActive effects:§!\nWeekly Manpower §R-75§!\nConsumer Goods §R+5%§!\n\n§YOn selecting:§!\nStability §G+5%§!\n\n§YRouting effect:§!\nRefugees §Gstrongly prefer§! your territory"

 bm_refugees_welcoming: "§GWelcoming Policy§!"
 bm_refugees_welcoming_desc: "Refugees are accepted and processed through an organised intake system. Your country remains a preferred destination for those fleeing conflict.\n\n§YActive effects:§!\nWeekly Manpower §R-35§!\nConsumer Goods §R+2.5%§!\n\n§YOn selecting:§!\nStability §G+2%§!\n\n§YRouting effect:§!\nRefugees §Gprefer§! your territory"

 bm_refugees_neutral: "Neutral Policy§!"
 bm_refugees_neutral_desc: "Standard wartime border controls. Refugees may enter through normal channels but no special provisions are made.\n\nThis is the §Ydefault posture§!.\n\n§YRouting effect:§!\nRefugees may enter normally"

 bm_refugees_discouraging: "§YDiscouraging Policy§!"
 bm_refugees_discouraging_desc: "Border controls are tightened and refugee intake is actively limited. Significant bureaucratic resources drain political capital, and visible suffering breeds unrest.\n\n§YActive effects:§!\nPolitical Power per day §R-0.10§!\nResistance in occupied states §Rslightly increases§!\n\n§YOn selecting:§!\nStability §R-2%§!\n\n§YRouting effect:§!\nRefugees §Ravoid§! your territory unless no other option exists"

 bm_refugees_closed_borders: "§RClosed Borders§!"
 bm_refugees_closed_borders_desc: "Borders are sealed against all refugee movement. The enforcement apparatus is costly and your isolationism is noted internationally.\n\n§YActive effects:§!\nPolitical Power per day §R-0.20§!\nMonthly Opinion Gain §R-15%§!\nResistance in occupied states §Rincreases§!\n\n§YOn selecting:§!\nStability §R-5%§!\nWar Support §R-5%§!\n\n§YRouting effect:§!\nRefugees §Rcannot§! enter your territory"

 bm_refugees_closed: "§RClosed Borders§!"
 bm_refugees_closed_desc: "Borders are sealed against all refugee movement. The enforcement apparatus is costly and your isolationism is noted internationally.\n\n§YActive effects:§!\nPolitical Power per day §R-0.20§!\nMonthly Opinion Gain §R-15%§!\nResistance in occupied states §Rincreases§!\n\n§YOn selecting:§!\nStability §R-5%§!\nWar Support §R-5%§!\n\n§YRouting effect:§!\nRefugees §Rcannot§! enter your territory"

