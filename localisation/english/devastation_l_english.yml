l_english:

 # Decisions
 devastation_decisions: "Mitigating Devastation"
 devastation_decisions_desc: "Mitigating the devastation of states is essential for both wartime resilience and long-term peace. During war, reducing devastation helps maintain national stability, protect civilian morale, and ensure critical infrastructure remains functional. In times of peace, addressing devastation is vital for economic recovery, population well-being, and preventing future instability, allowing the nation to thrive and rebuild more effectively."
 
 devastation_emergency_repairs: "Emergency Repairs"
 devastation_emergency_repairs_desc: "Dispatch repair teams to restore essential infrastructure, such as roads, bridges, and power lines, to keep the war effort moving."
 devastation_evacuation_orders: "Evacuation Orders"
 devastation_evacuation_orders_desc: "Implement large-scale evacuation of civilians from heavily bombed or shelled areas to minimize casualties and maintain morale."
 devastation_rapid_response_teams: "Rapid Response Teams"
 devastation_rapid_response_teams_desc: "Deploy rapid response teams to contain and control damage immediately after enemy strikes, focusing on fire control, medical aid, and emergency engineering."
 devastation_national_infrastructure_investment: "National Infrastructure Reinvestment"
 devastation_national_infrastructure_investment_desc: "Invest in rebuilding critical infrastructure to restore transportation networks and public utilities across devastated states."
 devastation_relief_fund_allocation: "Relief Fund Allocation"
 devastation_relief_fund_allocation_desc: "Allocate funds to provide immediate relief and resources for the most affected regions."
 devastation_public_works_initiative: "Public Works Initiative"
 devastation_public_works_initiative_desc: "Launch a large-scale public works program focused on employing the unemployed to rebuild devastated areas."
 devastation_funding_allies: "Funding §Y[FROM.GetAdjective]§! Repairs"
 devastation_funding_allies_desc: "Send aid to our [FROM.GetAdjective] allies in order to fix the devastations on their states."
 devastation_funding_allies_tt: "§RThere are no [FROM.GetAdjective] devastated states!§!"
 devastation_funding_allies_cancel_trigger: "Opinion of [FROM.GetFlag] §Y[FROM.GetNameDefCap]§! is lower than §Y50§! and is not an ally of [ROOT.GetFlag] §Y[ROOT.GetNameDefCap]§!"
 
 
 assimilation_decisions: "Displaced Populations"
 assimilation_decisions_desc: "As devastation spreads across the land, §Ypopulations§! are uprooted from their homes and livelihoods. These §Ydisplaced civilians§!, whether fleeing destruction within our borders or arriving from abroad, are grouped under our §OUnassimilated Population§! pool.\n\nThese populations are not yet fully reintegrated into the economic and administrative structure of the state. Over time, we may §Greintegrate§! them into our core population through natural recovery or targeted political efforts. Alternatively, if the burden becomes too great, we may choose to §Rforcibly expel§! them beyond our borders...\n\nCurrently, we have a total §OUnassimilated Population§! of §R[?country_unassimilated_pops|2]K§!, representing §Y[CountryUnassimilatedPopsRatio]§! of our §Ccore population§! of §C[?country_core_population_controlled]K§!.\n\nFor every §Y0.1%§! of this ratio, we suffer a debuff of §R[?global.unassimilated_stability_factor]%§! to §YStability§!. At present, this results in a total penalty of [?country_unassimilated_pops_modifier^0|+2%] §YStability Factor§!.\n\nSince the start of the game, a total of §Y[?total_external_refugees_in_game|2]K§! §Ointernally & externally displaced civilians§! have been registered inside our nation, of whom §G[?total_external_refugees_assimilated_in_game|2]K§! were §Greintegrated§! and §R[?total_external_refugees_expelled_in_game|2]K§! were §Rforcibly expelled§!.\n\nIf you are at peace and neighboring nations at war, it's very likely that you have external refugees & if you're at war and losing ground/being actively bombed, its more than likely that you have internal refugees."

 assimilation_passive_decision: "Passive Population Reintegration"
 assimilation_passive_decision_desc: "Over time, displaced and unassimilated populations will gradually reintegrate into society as housing is restored and administrative order returns."
 assimilation_passive_decision_tt: "A random amount of §OUnassimilated Pops§! between §Y[?assimilate_unassimilated_pops_min|0%]§! and §Y[?assimilate_unassimilated_pops_max|0%]§! in every state with §OUnassimilated Pops§! will be §Greintegrated§!.\n\n"

 assimilation_nationwide_drive_decision: "Nationwide Reintegration Drive"
 assimilation_nationwide_drive_decision_desc: "Launch a coordinated national effort to reintegrate displaced and unassimilated populations across all controlled states."
 assimilation_nationwide_drive_decision_tt: "A random amount of §OUnassimilated Pops§! between §Y[?assimilate_unassimilated_pops_min|0%]§! and §Y[?assimilate_unassimilated_pops_max|0%]§! in every state with §OUnassimilated Pops§! will be §Greintegrated§!.\n\n"

 assimilation_expel_decision: "Forced Population Expulsion"
 assimilation_expel_decision_desc: "Purge the state apparatus of displaced populations by forcibly expelling unassimilated civilians beyond our borders."
 assimilation_expel_decision_tt: "A random amount of §OUnassimilated Pops§! between §Y[?assimilate_expel_pops_min|0%]§! and §Y[?assimilate_expel_pops_max|0%]§! in every state with §OUnassimilated Pops§! will be §Rexpelled§!.\n\n"

 
 
